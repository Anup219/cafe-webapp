<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MenU</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

    <style>
      /* Splash overlay styling */
    </style>

    <!-- Razorpay Checkout JS -->
    <script async src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- PWA settings handled by vite-plugin-pwa -->
    <meta name="theme-color" content="#d84315" />
    <link rel="apple-touch-icon" href="/menu_logo.jpeg" />
    <link rel="icon" type="image/jpeg" href="/menu_logo.jpeg" />

    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      
      .splash-container {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        object-fit: contain;
        border-radius: 28px;
        z-index: 2;
        /* Stable Reveal Animation */
        animation: logoReveal 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        box-shadow: 0 10px 30px rgba(216, 67, 21, 0.1);
      }

      .splash-halo {
        position: absolute;
        width: 130px;
        height: 130px;
        background: radial-gradient(circle, rgba(216, 67, 21, 0.15) 0%, rgba(216, 67, 21, 0) 70%);
        border-radius: 50%;
        animation: haloPulse 2.5s ease-in-out infinite 1s;
      }

      @keyframes logoReveal {
        from { opacity: 0; transform: scale(0.9) translateY(10px); filter: blur(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      }

      @keyframes haloPulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.4); opacity: 0.6; }
      }

      .loader-text {
        position: absolute;
        bottom: 48px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: #2c2f2e;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <!-- Capture PWA install prompt BEFORE React boots -->
    <script>
      window.__pwaPrompt = null;
      window.__pwaPromptReady = false;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.__pwaPromptReady = true;
        window.dispatchEvent(new Event('pwa-prompt-ready'));
      });
    </script>
    
    <div id="root"></div>

    <!-- PWA Snap Screen Overlay -->
    <div id="pwa-splash">
      <div class="splash-container">
        <div class="splash-halo"></div>
        <img src="/menu_logo.jpeg" alt="MenU" class="splash-logo" width="120" height="120" fetchpriority="high" />
      </div>
      <div class="loader-text">MeNU Café</div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
